<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register Volunteer - VolunteerIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">VolunteerIQ</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/submit">Submit Need</a></li>
            <li class="nav-item"><a class="nav-link active" href="/register">Register Volunteer</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-section">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">Register Volunteer</h1>
              <form id="volunteerForm">
                <div class="mb-3">
                  <label for="name" class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="name" name="name" required />
                </div>
                <div class="mb-3">
                  <label for="phone" class="form-label">Phone</label>
                  <input type="text" class="form-control" id="phone" name="phone" />
                </div>
                <div class="mb-3">
                  <label for="location" class="form-label">Location</label>
                  <input type="text" class="form-control" id="location" name="location" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Skills Required</label>
                  <div class="row g-2">
                    <div class="col-6 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Medical" /> <span class="form-check-label">Medical</span></label></div>
                    <div class="col-6 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Construction" /> <span class="form-check-label">Construction</span></label></div>
                    <div class="col-6 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Teaching" /> <span class="form-check-label">Teaching</span></label></div>
                    <div class="col-6 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Counseling" /> <span class="form-check-label">Counseling</span></label></div>
                    <div class="col-6 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Logistics" /> <span class="form-check-label">Logistics</span></label></div>
                    <div class="col-6 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Tech" /> <span class="form-check-label">Tech</span></label></div>
                    <div class="col-12 col-md-4"><label class="form-check"><input class="form-check-input" type="checkbox" name="skills" value="Food" /> <span class="form-check-label">Food</span></label></div>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="availability" class="form-label">Availability</label>
                  <select class="form-select" id="availability" name="availability">
                    <option value="available" selected>Available</option>
                    <option value="busy">Busy</option>
                    <option value="offline">Offline</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-primary">Register Volunteer</button>
              </form>
              <div id="volunteerFormMessage" class="mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="container py-4">
      <p class="mb-0 text-muted">VolunteerIQ · Volunteer skill profiles for rapid matching.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
