<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit Need - VolunteerIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">VolunteerIQ</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="/submit">Submit Need</a></li>
            <li class="nav-item"><a class="nav-link" href="/register">Register Volunteer</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-section">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">Submit a Community Need</h1>
              <form id="needForm">
                <div class="mb-3">
                  <label for="text" class="form-label">Community Report</label>
                  <textarea class="form-control" id="text" name="text" rows="6" placeholder="Type or paste the report here"></textarea>
                </div>
                <div class="mb-3">
                  <label for="file" class="form-label">Upload Image or PDF</label>
                  <input class="form-control" type="file" id="file" name="file" accept="image/*,.pdf" />
                </div>
                <button type="submit" class="btn btn-primary">Submit Need</button>
              </form>
              <div id="needFormMessage" class="mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="container py-4">
      <p class="mb-0 text-muted">VolunteerIQ · Smart need intake for NGOs.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
